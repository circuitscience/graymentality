server {
    listen 80;
    server_name graymentality.ca www.graymentality.ca;

    root /var/www/graymentality/public;
    index index.php index.html;

    access_log /var/log/nginx/graymentality_access.log;
    error_log /var/log/nginx/graymentality_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
