<VirtualHost *:80>
    ServerName graymentality.ca
    ServerAlias www.graymentality.ca

    DocumentRoot /var/www/graymentality/public
    DirectoryIndex index.php index.html

    <Directory /var/www/graymentality/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/graymentality_error.log
    CustomLog ${APACHE_LOG_DIR}/graymentality_access.log combined
</VirtualHost>