services:
  db:
    image: mariadb:10.6.24
    container_name: gm-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    environment:
      TZ: America/Toronto
      MARIADB_DATABASE: ${DB_NAME:-jerry_bil_graymentality}
      MARIADB_USER: ${DB_USER:-graymentality}
      MARIADB_PASSWORD: ${DB_PASS:-graymentality}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - graymentality_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gm-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: America/Toronto
      APP_ROOT: /var/www/html
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - ./:/var/www/html:rw
    ports:
      - "${WEB_PORT:-8088}:80"

  cron:
    build:
      context: .
      dockerfile: docker/cron/Dockerfile
    container_name: gm-cron
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: America/Toronto
      APP_ROOT: /var/www/html
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - ./:/var/www/html:rw

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: gm-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      TZ: America/Toronto
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    ports:
      - "${PMA_PORT:-8090}:80"

volumes:
  graymentality_mariadb_data:
